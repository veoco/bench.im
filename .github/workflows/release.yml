name: Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v1.0.0)'
        required: true
      prerelease:
        description: 'Mark as prerelease'
        required: false
        default: 'false'

env:
  CARGO_TERM_COLOR: always

jobs:
  build-server-linux:
    runs-on: ${{ matrix.runner }}
    env:
      RUST_BACKTRACE: full

    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            runner: ubuntu-latest
          - target: aarch64-unknown-linux-musl
            runner: ubuntu-24.04-arm

    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@nightly
        with:
          targets: ${{ matrix.target }}

      - name: Install musl-tools
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Install TailwindCSS
        run: |
          cd server/web
          curl -sLO https://github.com/tailwindlabs/tailwindcss/releases/latest/download/tailwindcss-linux-${{ matrix.target == 'aarch64-unknown-linux-musl' && 'arm64' || 'x64' }}-musl
          chmod +x tailwindcss-linux-${{ matrix.target == 'aarch64-unknown-linux-musl' && 'arm64' || 'x64' }}-musl
          mv tailwindcss-linux-${{ matrix.target == 'aarch64-unknown-linux-musl' && 'arm64' || 'x64' }}-musl tailwindcss

      - name: Build Server
        timeout-minutes: 15
        run: |
          mkdir -p server/build/release
          cargo build --release --target ${{ matrix.target }} -p bim-server
          cp target/${{ matrix.target }}/release/bim-server server/build/release/bim-server

      - name: UPX
        uses: crazy-max/ghaction-upx@v4
        with:
          version: latest
          files: ./server/build/release/bim-server
          args: --best --lzma

      - name: Rename
        run: mv server/build/release/bim-server server/build/release/server-linux-${{ matrix.target == 'aarch64-unknown-linux-musl' && 'aarch64' || 'x86_64' }}

      - name: Upload Release Asset
        uses: actions/upload-artifact@v7
        with:
          name: server-${{ matrix.target }}
          path: server/build/release/server-linux-${{ matrix.target == 'aarch64-unknown-linux-musl' && 'aarch64' || 'x86_64' }}

  build-server-windows:
    runs-on: windows-latest
    env:
      RUST_BACKTRACE: full

    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@nightly

      - name: Install TailwindCSS
        run: |
          cd server/web
          curl -sLO https://github.com/tailwindlabs/tailwindcss/releases/latest/download/tailwindcss-windows-x64.exe
          chmod +x tailwindcss-windows-x64.exe
          mv tailwindcss-windows-x64.exe tailwindcss.exe

      - name: Build Server
        timeout-minutes: 15
        run: |
          mkdir -p server/build/release
          cargo build --release -p bim-server
          cp target/release/bim-server.exe server/build/release/bim-server.exe

      - name: Rename
        run: mv server/build/release/bim-server.exe server/build/release/server-windows.exe

      - name: Upload Release Asset
        uses: actions/upload-artifact@v7
        with:
          name: server-windows
          path: server/build/release/server-windows.exe

  build-server-macos:
    runs-on: macos-latest
    env:
      RUST_BACKTRACE: full

    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@nightly

      - name: Install TailwindCSS
        run: |
          cd server/web
          if [ "$(uname -m)" = "arm64" ]; then
            curl -sLO https://github.com/tailwindlabs/tailwindcss/releases/latest/download/tailwindcss-macos-arm64
            chmod +x tailwindcss-macos-arm64
            mv tailwindcss-macos-arm64 tailwindcss
          else
            curl -sLO https://github.com/tailwindlabs/tailwindcss/releases/latest/download/tailwindcss-macos-x64
            chmod +x tailwindcss-macos-x64
            mv tailwindcss-macos-x64 tailwindcss
          fi

      - name: Build Server
        timeout-minutes: 15
        run: |
          mkdir -p server/build/release
          cargo build --release -p bim-server
          cp target/release/bim-server server/build/release/bim-server

      - name: Rename
        run: mv server/build/release/bim-server server/build/release/server-macos

      - name: Upload Release Asset
        uses: actions/upload-artifact@v7
        with:
          name: server-macos
          path: server/build/release/server-macos

  build-client-linux:
    runs-on: ${{ matrix.runner }}
    env:
      RUST_BACKTRACE: full

    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            runner: ubuntu-latest
          - target: aarch64-unknown-linux-musl
            runner: ubuntu-24.04-arm

    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@nightly
        with:
          targets: ${{ matrix.target }}

      - name: Install musl-tools
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Build Client
        timeout-minutes: 15
        run: |
          mkdir -p client/build/release
          cargo build --release --target ${{ matrix.target }} -p bim
          cp target/${{ matrix.target }}/release/bim client/build/release/bim

      - name: UPX Compress
        uses: crazy-max/ghaction-upx@v4
        with:
          version: latest
          files: |
            client/build/release/bim
          args: --best --lzma

      - name: Rename
        run: mv client/build/release/bim client/build/release/client-linux-${{ matrix.target == 'aarch64-unknown-linux-musl' && 'aarch64' || 'x86_64' }}

      - name: Upload Release Asset
        uses: actions/upload-artifact@v7
        with:
          name: client-${{ matrix.target }}
          path: client/build/release/client-linux-${{ matrix.target == 'aarch64-unknown-linux-musl' && 'aarch64' || 'x86_64' }}

  build-client-windows:
    runs-on: windows-latest
    env:
      RUST_BACKTRACE: full

    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@nightly

      - name: Build Client
        timeout-minutes: 15
        run: |
          mkdir -p client/build/release
          cargo build --release -p bim
          cp target/release/bim.exe client/build/release/bim.exe

      - name: Rename
        run: |
          mv client/build/release/bim.exe client/build/release/client-windows.exe

      - name: Upload Release Asset
        uses: actions/upload-artifact@v7
        with:
          name: client-windows
          path: client/build/release/client-windows.exe

  build-client-macos:
    runs-on: macos-latest
    env:
      RUST_BACKTRACE: full

    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@nightly

      - name: Build Client
        timeout-minutes: 15
        run: |
          mkdir -p client/build/release
          cargo build --release -p bim
          cp target/release/bim client/build/release/bim

      - name: Rename
        run: mv client/build/release/bim client/build/release/client-macos

      - name: Upload Release Asset
        uses: actions/upload-artifact@v7
        with:
          name: client-macos
          path: client/build/release/client-macos

  create-release:
    needs: [build-server-linux, build-server-windows, build-server-macos, build-client-linux, build-client-windows, build-client-macos]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Download All Artifacts
        uses: actions/download-artifact@v6
        with:
          path: artifacts

      - name: List Artifacts
        run: ls -la artifacts/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag }}
          name: ${{ github.event.inputs.tag }}
          draft: false
          prerelease: ${{ github.event.inputs.prerelease }}
          generate_release_notes: true
          files: |
            artifacts/server-x86_64-unknown-linux-musl/server-linux-x86_64
            artifacts/server-aarch64-unknown-linux-musl/server-linux-aarch64
            artifacts/server-windows/server-windows.exe
            artifacts/server-macos/server-macos
            artifacts/client-x86_64-unknown-linux-musl/client-linux-x86_64
            artifacts/client-aarch64-unknown-linux-musl/client-linux-aarch64
            artifacts/client-windows/client-windows.exe
            artifacts/client-macos/client-macos
