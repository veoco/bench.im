name: Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v1.0.0)'
        required: true
      prerelease:
        description: 'Mark as prerelease'
        required: false
        default: 'false'

env:
  CARGO_TERM_COLOR: always

jobs:
  build-server-linux:
    runs-on: ubuntu-latest
    env:
      RUST_BACKTRACE: full

    strategy:
      matrix:
        target:
          - x86_64-unknown-linux-musl
          - aarch64-unknown-linux-musl

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@nightly
        with:
          targets: ${{ matrix.target }}

      - name: Install cross
        run: cargo install cross

      - name: Build ${{ matrix.target }}
        timeout-minutes: 15
        working-directory: server
        run: |
          mkdir -p ./build/release
          cross build --target ${{ matrix.target }} --release
          cp ../../target/${{ matrix.target }}/release/bim-server ./build/release/bim-server

      - name: UPX
        uses: crazy-max/ghaction-upx@v2
        with:
          version: latest
          files: ./server/build/release/bim-server
          args: --best --lzma

      - name: Tar Artifacts
        working-directory: server/build/release
        run: |
          tar -czf server-${{ matrix.target }}.tar.gz bim-server

      - name: Upload Release Asset
        uses: actions/upload-artifact@v4
        with:
          name: server-${{ matrix.target }}
          path: server/build/release/server-${{ matrix.target }}.tar.gz

  build-server-windows:
    runs-on: windows-latest
    env:
      RUST_BACKTRACE: full

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@nightly

      - name: Build
        timeout-minutes: 15
        working-directory: server
        run: |
          cargo build --release
          mkdir -p ./build/release
          cp ../../target/release/bim-server.exe ./build/release/bim-server.exe

      - name: Upload Release Asset
        uses: actions/upload-artifact@v4
        with:
          name: server-windows
          path: server/build/release/bim-server.exe

  build-server-macos:
    runs-on: macos-latest
    env:
      RUST_BACKTRACE: full

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@nightly

      - name: Build
        timeout-minutes: 120
        working-directory: server
        run: |
          cargo build --release
          mkdir -p ./build/release
          cp ../../target/release/bim-server ./build/release/bim-server

      - name: Tar Artifacts
        working-directory: server/build/release
        run: |
          tar -czf server-macos.tar.gz bim-server

      - name: Upload Release Asset
        uses: actions/upload-artifact@v4
        with:
          name: server-macos
          path: server/build/release/server-macos.tar.gz

  build-client-linux:
    runs-on: ubuntu-latest
    env:
      RUST_BACKTRACE: full

    strategy:
      matrix:
        target:
          - x86_64-unknown-linux-musl
          - aarch64-unknown-linux-musl

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly
          target: ${{ matrix.target }}

      - name: Install cross
        run: cargo install cross

      - name: Build ${{ matrix.target }}
        timeout-minutes: 15
        working-directory: client
        run: |
          mkdir -p build/release
          cross build --target ${{ matrix.target }} --release
          cp ../../target/${{ matrix.target }}/release/bim build/release/bim

      - name: UPX Compress
        uses: crazy-max/ghaction-upx@v2
        with:
          version: latest
          files: |
            client/build/release/bim
          args: --best --lzma

      - name: Tar Artifacts
        working-directory: client/build/release
        run: |
          tar -czf client-${{ matrix.target }}.tar.gz bim

      - name: Upload Release Asset
        uses: actions/upload-artifact@v4
        with:
          name: client-${{ matrix.target }}
          path: client/build/release/client-${{ matrix.target }}.tar.gz

  build-client-windows:
    runs-on: windows-latest
    env:
      RUST_BACKTRACE: full

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly

      - name: Build
        timeout-minutes: 15
        working-directory: client
        run: |
          cargo build --release
          mkdir build\release
          copy ..\..\target\release\bim.exe build\release\bim.exe

      - name: Upload Release Asset
        uses: actions/upload-artifact@v4
        with:
          name: client-windows
          path: client/build/release/bim.exe

  build-client-macos:
    runs-on: macos-latest
    env:
      RUST_BACKTRACE: full

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly

      - name: Build
        timeout-minutes: 15
        working-directory: client
        run: |
          cargo build --release
          mkdir -p build/release
          cp ../../target/release/bim build/release/bim

      - name: Tar Artifacts
        working-directory: client/build/release
        run: |
          tar -czf client-macos.tar.gz bim

      - name: Upload Release Asset
        uses: actions/upload-artifact@v4
        with:
          name: client-macos
          path: client/build/release/client-macos.tar.gz

  create-release:
    needs: [build-server-linux, build-server-windows, build-server-macos, build-client-linux, build-client-windows, build-client-macos]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download All Artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List Artifacts
        run: ls -la artifacts/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag }}
          name: ${{ github.event.inputs.tag }}
          draft: false
          prerelease: ${{ github.event.inputs.prerelease }}
          generate_release_notes: true
          files: |
            artifacts/server-x86_64-unknown-linux-musl/server-x86_64-unknown-linux-musl.tar.gz
            artifacts/server-aarch64-unknown-linux-musl/server-aarch64-unknown-linux-musl.tar.gz
            artifacts/server-windows/bim-server.exe
            artifacts/server-macos/server-macos.tar.gz
            artifacts/client-x86_64-unknown-linux-musl/client-x86_64-unknown-linux-musl.tar.gz
            artifacts/client-aarch64-unknown-linux-musl/client-aarch64-unknown-linux-musl.tar.gz
            artifacts/client-windows/bim.exe
            artifacts/client-macos/client-macos.tar.gz
