{% extends "base.html" %}

{% block title %}{{ site_name }} - 网络监控{% endblock %}

{% block content %}
{% if targets.is_empty() %}
<!-- 空状态 -->
<div class="p-4">
    <div class="flex flex-col items-center justify-center py-16 text-center">
        <svg class="w-16 h-16 text-neutral-300 mb-4" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor">
            <path d="M5 11H19V5H5V11ZM21 4V20C21 20.5523 20.5523 21 20 21H4C3.44772 21 3 20.5523 3 20V4C3 3.44772 3.44772 3 4 3H20C20.5523 3 21 3.44772 21 4ZM19 13H5V19H19V13ZM7 15H10V17H7V15ZM7 7H10V9H7V7Z"></path>
        </svg>
        <h3 class="text-lg font-medium text-neutral-600 mb-2">暂无监控目标</h3>
        <p class="text-sm text-neutral-400 mb-4">当前没有配置任何监控目标</p>
        <a href="/admin/" class="button-primary px-4 py-2 text-sm">前往管理后台添加</a>
    </div>
</div>
{% else %}
<!-- 目标网格 -->
<div class="p-4 grid grid-cols-2 gap-2 sm:grid-cols-4 lg:grid-cols-6" id="targetsGrid">
    {% for target in targets %}
    <a href="/t/{{ target.id }}" class="target-card" data-id="{{ target.id }}" data-updated="{{ target.updated }}">
        <div class="p-3 flex items-center">
            <div class="w-7 h-7 rounded-full bg-neutral-100 flex items-center justify-center mr-2 flex-shrink-0">
                <svg class="w-3.5 text-neutral-500" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M5 11H19V5H5V11ZM21 4V20C21 20.5523 20.5523 21 20 21H4C3.44772 21 3 20.5523 3 20V4C3 3.44772 3.44772 3 4 3H20C20.5523 3 21 3.44772 21 4ZM19 13H5V19H19V13ZM7 15H10V17H7V15ZM7 7H10V9H7V7Z"></path>
                </svg>
            </div>
            <span class="truncate text-sm text-neutral-700 font-medium">{{ target.name }}</span>
            <span class="flex items-center ml-auto flex-shrink-0 status-light" data-updated="{{ target.updated }}">
                <span class="w-2 h-2 rounded-full bg-neutral-300 transition-colors duration-300"></span>
            </span>
        </div>
    </a>
    {% endfor %}
</div>
{% endif %}

<!-- Toast 容器 -->
<div class="toast-container" id="toastContainer"></div>

<script>
// 页面加载时立即更新状态灯，并启动定时更新
document.addEventListener('DOMContentLoaded', function() {
    updateTargetStatusLights();
    setInterval(updateTargetStatusLights, 30000);
});

// 更新目标列表状态灯
async function updateTargetStatusLights() {
    try {
        const targets = await apiFetch('/api/targets/');
        if (!targets) return;

        const targetMap = new Map();
        targets.forEach(t => {
            targetMap.set(t.id, t.updated || 0);
        });

        document.querySelectorAll('.target-card').forEach(card => {
            const tid = parseInt(card.dataset.id);
            const updated = targetMap.get(tid) || 0;

            // 更新 data-updated 属性
            const statusLight = card.querySelector('.status-light');
            if (statusLight) {
                statusLight.dataset.updated = updated;
            }

            // 计算状态颜色
            const currentTime = Date.now();
            const updatedTime = updated * 1000;
            const diff = currentTime - updatedTime;

            let colorClass = 'bg-neutral-300';
            let pulseClass = '';
            if (updated > 0) {
                if (diff < 5 * 60 * 1000) {
                    colorClass = 'bg-green-500';
                    pulseClass = 'status-pulse-green';
                } else if (diff < 10 * 60 * 1000) {
                    colorClass = 'bg-yellow-500';
                } else {
                    colorClass = 'bg-red-500';
                }
            }

            // 更新状态灯
            const dot = card.querySelector('.status-light span');
            if (dot) {
                dot.className = `w-2 h-2 rounded-full transition-colors duration-300 ${colorClass} ${pulseClass}`;
            }
        });
    } catch (e) {
        // 忽略错误
    }
}
</script>
{% endblock %}
