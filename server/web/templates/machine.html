{% extends "base.html" %}

{% block title %}{{ machine.name }} - Bench.im{% endblock %}

{% block head %}
<link rel="stylesheet" href="/static/css/uplot.min.css">
{% endblock %}

{% block content %}
<div>
    <div class="flex items-baseline p-2">
        <h2 class="font-bold text-2xl mr-2">{{ machine.name }}</h2>
        <p class="text-neutral-500 text-sm">{{ machine.ip }}</p>
    </div>
    <div class="flex p-2 bg-neutral-100 leading-4 text-sm border-y border-neutral-400">
        <button class="border border-neutral-600 shadow-sm px-2 py-0.5 mr-2 bg-white" id="btnFixedY" type="button">对齐y轴</button>
        <button class="border border-neutral-600 shadow-sm px-2 py-0.5 mr-2 bg-white" id="btnIpv6" type="button">IPv6</button>
        <select class="pl-2 py-0 shadow-sm" id="dateRange">
            <option value="24h">最近 24 小时</option>
            <option value="7d">最近 7 天</option>
        </select>
    </div>

    <div class="p-2 gap-2 grid grid-cols-1 lg:grid-cols-2 xl:grid-cols-3" id="chartsGrid">
        {% for target in targets %}
        <div class="bg-white border border-neutral-400 chart-container" data-tid="{{ target.id }}">
            <h3 class="px-2 py-1 bg-neutral-100 border-b border-neutral-400 font-bold">{{ target.name }}</h3>
            <div class="w-full aspect-video relative chart-wrapper" id="chart-{{ target.id }}"></div>
        </div>
        {% endfor %}
    </div>
</div>
{% endblock %}

{% block scripts %}
<script src="/static/js/uplot.iife.min.js"></script>
<script src="/static/js/charts.js"></script>
<script>
document.addEventListener('DOMContentLoaded', function() {
    const mid = '{{ machine.id }}';
    const charts = {};
    
    // 初始化所有图表
    document.querySelectorAll('.chart-container').forEach(container => {
        const tid = container.dataset.tid;
        const wrapper = container.querySelector('.chart-wrapper');
        charts[tid] = new PingChart(wrapper, mid, tid);
    });
    
    // 控制按钮
    let fixedY = false;
    let ipv6 = false;
    let dateRange = '24h';
    
    document.getElementById('btnFixedY').addEventListener('click', function() {
        fixedY = !fixedY;
        this.classList.toggle('bg-neutral-500');
        this.classList.toggle('text-white');
        Object.values(charts).forEach(chart => chart.setFixedY(fixedY));
    });
    
    document.getElementById('btnIpv6').addEventListener('click', function() {
        ipv6 = !ipv6;
        this.classList.toggle('bg-neutral-500');
        this.classList.toggle('text-white');
        Object.values(charts).forEach(chart => chart.setIpv6(ipv6));
    });
    
    document.getElementById('dateRange').addEventListener('change', function() {
        dateRange = this.value;
        Object.values(charts).forEach(chart => chart.setDateRange(dateRange));
    });
});
</script>
{% endblock %}
