{% if machines.is_empty() %}
<div class="px-4 py-6 text-center">
    <svg class="w-8 h-8 text-neutral-300 mx-auto mb-2" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor">
        <path d="M4 3H20C20.5523 3 21 3.44772 21 4V11H3V4C3 3.44772 3.44772 3 4 3ZM3 13H21V20C21 20.5523 20.5523 21 20 21H4C3.44772 21 3 20.5523 3 20V13ZM7 16V18H10V16H7ZM7 6V8H10V6H7Z"></path>
    </svg>
    <p class="text-neutral-400 text-sm">暂无机器</p>
</div>
{% else %}
<div class="flex flex-col gap-2" id="machinesList">
    {% for m in machines %}
    <a href="/m/{{ m.id }}" 
       class="group flex items-center px-3 py-2.5 rounded-sm machine-item border-l-3 border-transparent transition-all duration-150 {% if current_machine_id == m.id %}bg-neutral-300 border-neutral-800{% else %}bg-neutral-100 hover:bg-neutral-200{% endif %}" 
       data-id="{{ m.id }}"
       data-updated="{{ m.updated }}">
        <div class="w-6 h-6 rounded-full bg-white/60 flex items-center justify-center mr-2 flex-shrink-0">
            <svg class="w-3 {% if current_machine_id == m.id %}text-neutral-800{% else %}text-neutral-500 group-hover:text-neutral-700{% endif %} transition-colors" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor">
                <path d="M4 3H20C20.5523 3 21 3.44772 21 4V11H3V4C3 3.44772 3.44772 3 4 3ZM3 13H21V20C21 20.5523 20.5523 21 20 21H4C3.44772 21 3 20.5523 3 20V13ZM7 16V18H10V16H7ZM7 6V8H10V6H7Z"></path>
            </svg>
        </div>
        <span class="truncate text-sm {% if current_machine_id == m.id %}text-neutral-800 font-medium{% else %}text-neutral-600 group-hover:text-neutral-800{% endif %}">{{ m.name }}</span>
        <span class="flex items-center ml-auto flex-shrink-0 status-light" data-updated="{{ m.updated }}">
            <span class="w-2 h-2 rounded-full bg-neutral-300 transition-colors duration-300"></span>
        </span>
    </a>
    {% endfor %}
</div>
{% endif %}
