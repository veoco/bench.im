{% extends "admin/base.html" %}

{% block title %}管理后台 - {{ site_name }}{% endblock %}

{% block content %}
<div>
    <div class="flex border-b border-neutral-400 bg-neutral-100 p-2 items-center">
        <h2 class="text-lg font-bold mr-3">机器列表</h2>
        <button class="button text-sm px-2 py-1" onclick="location.href='/admin/machines/new'">
            新增机器
        </button>
    </div>
    <div class="w-full p-2" id="adminMachinesList">
        <div class="text-neutral-500">加载中...</div>
    </div>
    
    <div class="flex border-y border-neutral-400 bg-neutral-100 p-2 items-center">
        <h2 class="text-lg font-bold mr-3">目标列表</h2>
        <button class="button text-sm px-2 py-1" onclick="location.href='/admin/targets/new'">
            新增目标
        </button>
    </div>
    <div class="w-full p-2" id="targetsList">
        <div class="text-neutral-500">加载中...</div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
document.addEventListener('DOMContentLoaded', async function() {
    // 检查登录状态
    const token = sessionStorage.getItem('token');
    if (!token) {
        window.location.href = '/admin/login';
        return;
    }
    
    // 加载机器列表
    try {
        const machines = await apiFetch('/api/admin/machines/');
        renderMachines(machines);
    } catch (err) {
        document.getElementById('adminMachinesList').innerHTML = '<div class="text-red-500">加载失败</div>';
    }
    
    // 加载目标列表
    try {
        const targets = await apiFetch('/api/admin/targets/');
        renderTargets(targets);
    } catch (err) {
        document.getElementById('targetsList').innerHTML = '<div class="text-red-500">加载失败</div>';
    }
});

function renderMachines(machines) {
    const container = document.getElementById('adminMachinesList');
    if (!machines || machines.length === 0) {
        container.innerHTML = '<div class="text-neutral-500">暂无机器</div>';
        return;
    }
    
    container.innerHTML = '<div class="gap-2 grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 2xl:grid-cols-6">' +
        machines.map(m => `
            <div class="flex flex-col bg-white border border-neutral-400 justify-between">
                <h3 class="p-2 flex flex-col">
                    <span class="font-bold text-sm truncate">${escapeHtml(m.name)}</span>
                    <span class="text-neutral-500 text-xs truncate">${escapeHtml(m.ip)}</span>
                </h3>
                <ul class="flex border-t border-neutral-400 p-2 bg-neutral-100 text-xs items-center">
                    <li class="mr-auto truncate"></li>
                    <li class="ml-1 shrink-0">
                        <button class="button-info text-xs px-1 py-0.5 mr-1" onclick="location.href='/admin/machines/${m.id}'">编辑</button>
                    </li>
                    <li class="shrink-0">
                        <button class="button-danger text-xs px-1 py-0.5" onclick="location.href='/admin/machines/${m.id}/delete'">删除</button>
                    </li>
                </ul>
            </div>
        `).join('') + '</div>';
}

function renderTargets(targets) {
    const container = document.getElementById('targetsList');
    if (!targets || targets.length === 0) {
        container.innerHTML = '<div class="text-neutral-500">暂无目标</div>';
        return;
    }
    
    container.innerHTML = '<div class="gap-2 grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 2xl:grid-cols-6">' +
        targets.map(t => `
            <div class="flex flex-col bg-white border border-neutral-400 justify-between">
                <h3 class="p-2 flex flex-col">
                    <span class="font-bold text-sm truncate">${escapeHtml(t.name)}</span>
                    <span class="text-neutral-500 text-xs truncate">${t.ipv4 || ''}</span>
                    <span class="text-neutral-500 text-xs truncate">${t.ipv6 || ''}</span>
                </h3>
                <ul class="flex border-t border-neutral-400 p-2 bg-neutral-100 text-xs items-center">
                    <li class="mr-auto truncate">${t.domain || ''}</li>
                    <li class="ml-1 shrink-0">
                        <button class="button-info text-xs px-1 py-0.5 mr-1" onclick="location.href='/admin/targets/${t.id}'">编辑</button>
                    </li>
                    <li class="shrink-0">
                        <button class="button-danger text-xs px-1 py-0.5" onclick="location.href='/admin/targets/${t.id}/delete'">删除</button>
                    </li>
                </ul>
            </div>
        `).join('') + '</div>';
}
</script>
{% endblock %}
