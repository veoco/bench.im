{% extends "admin/base.html" %}

{% block title %}{% if is_edit %}编辑{% else %}新增{% endif %}目标 - {{ site_name }}{% endblock %}

{% block content %}
<div class="flex justify-center p-4 items-center sm:h-screen">
    <form class="max-w-md w-full bg-white rounded-sm shadow-sm p-6 sm:p-8" id="targetForm" data-tid="{{ id }}">
        <h2 class="text-center text-xl font-bold text-neutral-800 mb-6">{% if is_edit %}编辑{% else %}新增{% endif %}目标</h2>

        <div class="mb-4">
            <label class="block text-sm font-medium text-neutral-700 mb-1.5">名称 <span class="text-red-500">*</span></label>
            <input class="input" type="text" id="name" value="{{ name }}" placeholder="输入目标名称" required />
        </div>

        <div class="mb-4">
            <label class="block text-sm font-medium text-neutral-700 mb-1.5">域名</label>
            <input class="input" type="text" id="domain" value="{{ domain }}" placeholder="例如：example.com" />
        </div>

        <div class="mb-4">
            <label class="block text-sm font-medium text-neutral-700 mb-1.5">IPv4 地址</label>
            <input class="input" type="text" id="ipv4" value="{{ ipv4 }}" placeholder="例如：1.2.3.4" />
        </div>

        <div class="mb-6">
            <label class="block text-sm font-medium text-neutral-700 mb-1.5">IPv6 地址</label>
            <input class="input" type="text" id="ipv6" value="{{ ipv6 }}" placeholder="例如：2001:db8::1" />
        </div>

        <button class="w-full p-2.5 button-primary font-medium transition-all duration-150 hover:opacity-90" type="submit">
            {% if is_edit %}保存修改{% else %}创建目标{% endif %}
        </button>
    </form>
</div>
{% endblock %}

{% block scripts %}
<script>
document.getElementById('targetForm').addEventListener('submit', async function(e) {
    e.preventDefault();
    const tid = parseInt(this.dataset.tid) || 0;
    const data = { name: document.getElementById('name').value };
    
    const domain = document.getElementById('domain').value;
    if (domain) data.domain = domain;
    
    const ipv4 = document.getElementById('ipv4').value;
    if (ipv4) data.ipv4 = ipv4;
    
    const ipv6 = document.getElementById('ipv6').value;
    if (ipv6) data.ipv6 = ipv6;
    
    try {
        const url = tid ? `/api/admin/targets/${tid}` : '/api/admin/targets/';
        const res = await apiFetch(url, {
            method: 'POST',
            body: JSON.stringify(data)
        });
        
        if (res) {
            window.location.href = '/admin/';
        }
    } catch (err) {
        alert(tid ? '编辑失败' : '新增失败');
    }
});
</script>
{% endblock %}
