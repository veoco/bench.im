{% extends "base.html" %}
{% set is_admin = true %}

{% block title %}管理登录 - {{ site_name }}{% endblock %}

{% block content %}
<div class="flex justify-center p-4 items-center min-h-[calc(100vh-48px)] sm:h-screen">
    <form class="max-w-sm w-full bg-white rounded-sm shadow-sm p-6 sm:p-8" id="loginForm">
        <div class="text-center mb-6">
            <div class="w-12 h-12 bg-neutral-800 rounded-sm flex items-center justify-center mx-auto mb-4">
                <svg class="w-6 h-6 text-white" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M12 14V22H4C4 17.5817 7.58172 14 12 14ZM12 13C8.685 13 6 10.315 6 7C6 3.685 8.685 1 12 1C15.315 1 18 3.685 18 7C18 10.315 15.315 13 12 13ZM14.5946 18.8115C14.5327 18.5511 14.5 18.2794 14.5 18C14.5 17.7207 14.5327 17.449 14.5945 17.1886L13.6029 16.6161L14.6029 14.884L15.5952 15.4569C15.9883 15.0851 16.4676 14.8034 17 14.6449V13.5H19V14.6449C19.5324 14.8034 20.0116 15.0851 20.4047 15.4569L21.3971 14.8839L22.3972 16.616L21.4055 17.1885C21.4673 17.449 21.5 17.7207 21.5 18C21.5 18.2793 21.4673 18.551 21.4055 18.8114L22.3972 19.3839L21.3972 21.116L20.4048 20.543C20.0117 20.9149 19.5325 21.1966 19.0001 21.355V22.5H17.0001V21.3551C16.4677 21.1967 15.9884 20.915 15.5953 20.5431L14.603 21.1161L13.6029 19.384L14.5946 18.8115ZM18 17C17.4477 17 17 17.4477 17 18C17 18.5523 17.4477 19 18 19C18.5523 19 19 18.5523 19 18C19 17.4477 18.5523 17 18 17Z"></path>
                </svg>
            </div>
            <h2 class="text-xl font-bold text-neutral-800">管理登录</h2>
            <p class="text-sm text-neutral-500 mt-1">请输入管理密码继续</p>
        </div>

        <div class="mb-6">
            <input class="input" type="password" id="password" placeholder="请输入密码" required />
        </div>

        <button class="w-full p-2.5 button-primary font-medium transition-all duration-150 hover:opacity-90" type="submit">
            登录
        </button>
    </form>
</div>
{% endblock %}

{% block scripts %}
<script>
document.getElementById('loginForm').addEventListener('submit', async function(e) {
    e.preventDefault();
    const password = document.getElementById('password').value;
    
    try {
        const res = await fetch('/api/admin/machines/', {
            method: 'GET',
            headers: {
                'Authorization': 'Bearer ' + password
            }
        });
        
        if (res.status === 200) {
            sessionStorage.setItem('token', password);
            window.location.href = '/admin/';
        } else {
            alert('密码错误');
        }
    } catch (err) {
        alert('登录失败: ' + err.message);
    }
});
</script>
{% endblock %}
