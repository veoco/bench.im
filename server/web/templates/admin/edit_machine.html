{% extends "base.html" %}
{% set is_admin = true %}

{% block title %}{% if is_edit %}编辑{% else %}新增{% endif %}机器 - {{ site_name }}{% endblock %}

{% block content %}
<div class="flex justify-center p-4 items-center min-h-[calc(100vh-48px)] sm:h-screen">
    <form class="max-w-md w-full bg-white rounded-sm shadow-sm p-6 sm:p-8" id="machineForm" data-mid="{{ id }}">
        <h2 class="text-center text-xl font-bold text-neutral-800 mb-6">{% if is_edit %}编辑{% else %}新增{% endif %}机器</h2>

        <div class="mb-4">
            <label class="block text-sm font-medium text-neutral-700 mb-1.5">名称 <span class="text-red-500">*</span></label>
            <input class="input" type="text" id="name" value="{{ name }}" placeholder="输入机器名称" required />
        </div>

        <div class="mb-4">
            <label class="block text-sm font-medium text-neutral-700 mb-1.5">IP 地址</label>
            <input class="input" type="text" id="ip" value="{{ ip }}" placeholder="例如：192.168.1.1" />
        </div>

        <div class="mb-6">
            <label class="block text-sm font-medium text-neutral-700 mb-1.5">密钥</label>
            <input class="input" type="text" id="key" value="{{ key }}" placeholder="用于机器认证的密钥" />
        </div>

        <button class="w-full p-2.5 button-primary font-medium transition-all duration-150 hover:opacity-90" type="submit">
            {% if is_edit %}保存修改{% else %}创建机器{% endif %}
        </button>
    </form>
</div>
{% endblock %}

{% block scripts %}
<script>
document.getElementById('machineForm').addEventListener('submit', async function(e) {
    e.preventDefault();
    const mid = parseInt(this.dataset.mid) || 0;
    const data = {
        name: document.getElementById('name').value,
        ip: document.getElementById('ip').value,
        key: document.getElementById('key').value
    };
    
    try {
        const url = mid ? `/api/admin/machines/${mid}` : '/api/admin/machines/';
        const res = await apiFetch(url, {
            method: 'POST',
            body: JSON.stringify(data)
        });
        
        if (res) {
            window.location.href = '/admin/';
        }
    } catch (err) {
        alert(mid ? '编辑失败' : '新增失败');
    }
});
</script>
{% endblock %}
